
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Parallax Video</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
        }
        .video-wrapper {
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        video {
            width: 100%;
            display: block;
        }
        .info {
            text-align: center;
            color: white;
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        .info h1 {
            font-size: 1.2rem;
            margin-bottom: 8px;
        }
        .info p {
            font-size: 0.9rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="video-wrapper">
            <video controls autoplay loop playsinline>
                <source src="./ar_parallax_lite.mp4" type="video/mp4">
                您的浏览器不支持视频播放
            </video>
        </div>
        <div class="info">
            <h1>🎬 AR Parallax 视频播放</h1>
            <p>扫码观看精彩内容</p>
        </div>
    </div>
</body>
</html>
