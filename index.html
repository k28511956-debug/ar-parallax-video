<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AR Parallax Video</title>
  <meta name="description" content="AR parallax loop video playback page.">
  <style>
    :root {
      color-scheme: dark;
      --bg: #101114;
      --fg: #f4f6f8;
      --muted: #a9b1bb;
      --line: rgba(255, 255, 255, 0.14);
      --panel: rgba(22, 24, 29, 0.86);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      min-height: 100vh;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
    }

    .stage {
      min-height: 0;
      display: grid;
      place-items: center;
      padding: 18px;
    }

    video {
      width: min(100%, 1120px);
      max-height: calc(100vh - 96px);
      background: #000;
      border: 1px solid var(--line);
      border-radius: 8px;
      object-fit: contain;
    }

    .bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      background: var(--panel);
      border-top: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }

    .title {
      margin: 0;
      font-size: 15px;
      font-weight: 650;
      line-height: 1.3;
    }

    .hint {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .link {
      color: var(--fg);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 650;
      text-decoration: none;
      white-space: nowrap;
    }

    @media (max-width: 640px) {
      .stage {
        padding: 10px;
      }

      video {
        max-height: calc(100vh - 112px);
      }

      .bar {
        align-items: stretch;
        flex-direction: column;
        gap: 10px;
      }

      .link {
        text-align: center;
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="stage" aria-label="Video player">
      <video controls autoplay muted loop playsinline preload="metadata" poster="">
        <source src="ar_parallax_loop12s.mp4" type="video/mp4">
        当前浏览器不支持 MP4 视频播放。
      </video>
    </section>
    <footer class="bar">
      <div>
        <p class="title">AR Parallax Loop</p>
        <p class="hint">扫码打开后可直接播放；若浏览器限制自动播放，请点击播放按钮。</p>
      </div>
      <a class="link" href="ar_parallax_loop12s.mp4" download>下载视频</a>
    </footer>
  </main>
</body>
</html>
